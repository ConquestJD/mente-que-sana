<section class="why section section--dark" id="why" aria-labelledby="why-title">
  <div class="container">
    <app-section-header
      eyebrow="Por qué este retiro"
      title="Tres puentes hacia la misma orilla."
      lead="Donde la ciencia más reciente y la sabiduría más antigua coinciden, ahí construimos la experiencia."
    />

    <div class="why__grid">
      @for (card of cards; track card.title; let i = $index) {
        <article
          class="why__card"
          appScrollReveal
          [delay]="i * 120"
        >
          <span class="why__icon" aria-hidden="true">
            @if (card.icon === 'brain') {
              <svg viewBox="0 0 48 48" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M16 12 C10 12 8 18 12 22 C8 26 12 32 18 32 L18 38 C22 38 24 36 24 32 L24 12 C22 10 20 10 16 12 Z"/>
                <path d="M32 12 C38 12 40 18 36 22 C40 26 36 32 30 32 L30 38 C26 38 24 36 24 32"/>
                <path d="M18 18 L22 20 M30 18 L26 20 M20 26 L26 26"/>
              </svg>
            } @else if (card.icon === 'wave') {
              <svg viewBox="0 0 48 48" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M4 26 Q10 14, 16 26 T28 26 T40 26 T46 26" stroke-linecap="round"/>
                <path d="M4 34 Q10 24, 16 34 T28 34 T40 34" stroke-linecap="round" opacity="0.5"/>
                <circle cx="24" cy="10" r="3"/>
              </svg>
            } @else {
              <svg viewBox="0 0 48 48" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.4">
                <path d="M4 40 L16 18 L22 28 L30 12 L44 40 Z" stroke-linejoin="round"/>
                <circle cx="36" cy="14" r="2.5" fill="currentColor"/>
                <path d="M4 40 L44 40" stroke-linecap="round"/>
              </svg>
            }
          </span>
          <span class="why__eyebrow title-sm">{{ card.eyebrow }}</span>
          <h3 class="why__title">{{ card.title }}</h3>
          <p class="why__body body-md">{{ card.body }}</p>
        </article>
      }
    </div>

    <figure class="why__quote" appScrollReveal [delay]="500">
      <blockquote class="why__quote-text">
        “La depresión, la ansiedad y el dolor crónico son lenguajes del cuerpo
        cuando la mente no ha podido decir lo que necesita decir.”
      </blockquote>
      <figcaption class="why__quote-author">
        <span class="title-sm">Dr. Bessel van der Kolk</span>
        <span class="body-sm">Psiquiatra · The Body Keeps the Score</span>
      </figcaption>
    </figure>

    <div class="why__cta">
      <app-button variant="secondary" routerLink="/experiencia">
        Conoce el programa
      </app-button>
    </div>
  </div>
</section>
