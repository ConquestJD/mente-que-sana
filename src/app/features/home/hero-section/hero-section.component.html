<section class="hero" aria-labelledby="hero-headline" #parallax>
  <div class="hero__sky" aria-hidden="true"></div>
  <div class="hero__mountain" aria-hidden="true"></div>
  <div class="hero__grain" aria-hidden="true"></div>
  <div class="hero__vignette" aria-hidden="true"></div>

  <div class="hero__inner container">
    <span class="hero__eyebrow ui-data">Retiro Vivencial · Valle Sagrado · Cusco</span>

    <h1 id="hero-headline" class="hero__headline">
      <span class="hero__line">El pensamiento que te enferma</span>
      <span class="hero__line hero__line--gold"><em>también puede sanarte.</em></span>
    </h1>

    <p class="hero__sub title-md">
      Dos días para reconocer · transformar · sembrar
    </p>

    <div class="hero__badge">
      <span class="hero__badge-dot"></span>
      <span class="hero__badge-text">10 personas · 2 días · 2,870 m s.n.m.</span>
    </div>

    <div class="hero__ctas">
      <app-button variant="primary" size="lg" routerLink="/tarifas">
        Reservar mi lugar
      </app-button>
      <app-button variant="ghost" routerLink="/experiencia">
        Conocer el programa
      </app-button>
    </div>

    <a class="hero__scroll" href="#why" aria-label="Descubre el programa">
      <span class="hero__scroll-line"></span>
      <span class="hero__scroll-label">Desliza</span>
    </a>
  </div>
</section>
