<section class="payment section section--cream" aria-labelledby="payment-title">
  <div class="container">
    <header class="payment__head" appScrollReveal>
      <span class="title-md payment__eyebrow">{{ copy().eyebrow }}</span>
      <h2 id="payment-title" class="payment__title">
        {{ copy().title }} <em>{{ copy().titleEm }}</em>
      </h2>
      <p class="body-lg payment__lead">
        {{ copy().lead }}
      </p>
    </header>

    <div class="payment__methods" appScrollReveal [delay]="120">
      <div class="payment__methods-text">
        <span class="title-sm payment__methods-eyebrow">{{ copy().methodsEyebrow }}</span>
        <p class="body-md payment__methods-desc">
          {{ copy().methodsDesc }}
        </p>
      </div>
      <div class="payment__methods-list">
        @for (m of copy().methods; track m) {
          <span class="payment__method">{{ m }}</span>
        }
      </div>
    </div>
  </div>
</section>
