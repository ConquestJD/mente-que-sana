<section class="testimonials section" aria-labelledby="testimonials-title">
  <div class="testimonials__bg" aria-hidden="true"></div>
  <div class="container">
    <header class="testimonials__head" appScrollReveal>
      <span class="title-md">Voces</span>
      <h2 id="testimonials-title" class="testimonials__title">
        Sembradores que ya <em>caminaron este camino.</em>
      </h2>
      <p class="testimonials__lead body-lg">
        No son reseñas de confort. Son relatos de quienes se atrevieron a parar.
      </p>
    </header>

    <div class="testimonials__grid">
      @for (t of testimonials; track t.name; let i = $index) {
        <article
          class="testimonial-card"
          [class.is-featured]="i === 0"
          appScrollReveal
          [delay]="i * 100"
        >
          <span class="testimonial-card__quote" aria-hidden="true">"</span>
          @if (i === 0) {
            <span class="testimonial-card__badge ui-data">Sembradora fundadora</span>
          }
          <p class="testimonial-card__text">{{ t.quote }}</p>
          <footer class="testimonial-card__meta">
            <div
              class="testimonial-card__avatar"
              [style.background-image]="'url(' + t.avatar + ')'"
              role="img"
              [attr.aria-label]="t.name"
            ></div>
            <div>
              <span class="testimonial-card__name">{{ t.name }}</span>
              <span class="testimonial-card__role">{{ t.role }} · {{ t.city }}</span>
            </div>
          </footer>
        </article>
      }
    </div>
  </div>
</section>
