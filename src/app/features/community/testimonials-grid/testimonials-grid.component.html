<section class="testimonials section section--light" aria-labelledby="testimonials-title">
  <div class="container">
    <header class="testimonials__head">
      <span class="title-md">Voces</span>
      <h2 id="testimonials-title" class="display-lg">Sembradores que ya caminaron este camino.</h2>
    </header>

    <div class="testimonials__grid">
      @for (t of testimonials; track t.name; let i = $index) {
        <article
          class="testimonial-card"
          appScrollReveal
          [delay]="i * 120"
        >
          <span class="testimonial-card__quote" aria-hidden="true">“</span>
          <p class="testimonial-card__text">{{ t.quote }}</p>
          <footer class="testimonial-card__meta">
            <div
              class="testimonial-card__avatar"
              [style.background-image]="'url(' + t.avatar + ')'"
              role="img"
              [attr.aria-label]="t.name"
            ></div>
            <div>
              <span class="testimonial-card__name">{{ t.name }}</span>
              <span class="testimonial-card__role">{{ t.role }} · {{ t.city }}</span>
            </div>
          </footer>
        </article>
      }
    </div>
  </div>
</section>
