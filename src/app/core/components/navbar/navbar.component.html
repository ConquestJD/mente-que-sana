<nav
  class="navbar"
  [class.navbar--scrolled]="scrolled()"
  [class.navbar--inverse]="inverse() && !scrolled() && !mobileOpen()"
  [class.navbar--open]="mobileOpen()"
  [attr.aria-label]="'nav.aria' | translate"
>
  <div class="navbar__inner container">
    <a class="navbar__brand" routerLink="/" [attr.aria-label]="'nav.home' | translate">
      <img
        class="navbar__logo-img"
        src="/logo.png"
        alt="Yachaytambo"
        width="44"
        height="44"
        loading="eager"
      />
      <span class="navbar__logo-block">
        <span class="navbar__logo-text">Yachaytambo</span>
        <span class="navbar__logo-sub">{{ 'nav.logoSub' | translate }}</span>
      </span>
    </a>

    <ul class="navbar__links">
      @for (link of links(); track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="is-active"
            class="navbar__link"
          >{{ link.label }}</a>
        </li>
      }
    </ul>

    <div class="navbar__actions">
      <button
        type="button"
        class="navbar__lang"
        (click)="toggleLocale()"
        [attr.aria-label]="langSwitchLabel()"
      >
        {{ i18n.locale() === 'es' ? ('lang.en' | translate) : ('lang.es' | translate) }}
      </button>

      <a
        class="navbar__cta"
        routerLink="/contacto"
        [attr.aria-label]="'nav.reserveAria' | translate"
      >{{ 'nav.reserve' | translate }}</a>
    </div>

    <button
      class="navbar__burger"
      type="button"
      (click)="toggleMobile()"
      [attr.aria-expanded]="mobileOpen()"
      aria-controls="mobile-menu"
      [attr.aria-label]="'nav.menu' | translate"
    >
      <span class="navbar__burger-line" [class.is-open]="mobileOpen()"></span>
      <span class="navbar__burger-line" [class.is-open]="mobileOpen()"></span>
      <span class="navbar__burger-line" [class.is-open]="mobileOpen()"></span>
    </button>
  </div>

  @if (mobileOpen()) {
    <div class="navbar__mobile" id="mobile-menu" @mobileMenu>
      <ul class="navbar__mobile-links">
        @for (link of links(); track link.path) {
          <li>
            <a
              [routerLink]="link.path"
              routerLinkActive="is-active"
              class="navbar__mobile-link"
            >{{ link.label }}</a>
          </li>
        }
        <li>
          <button type="button" class="navbar__mobile-lang" (click)="toggleLocale()">
            {{ langSwitchLabel() }}
          </button>
        </li>
        <li>
          <a routerLink="/contacto" class="navbar__mobile-cta">{{ 'nav.reserve' | translate }}</a>
        </li>
      </ul>
    </div>
  }
</nav>
