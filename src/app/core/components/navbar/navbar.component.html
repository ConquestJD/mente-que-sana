<nav
  class="navbar"
  [class.navbar--scrolled]="scrolled()"
  [class.navbar--inverse]="inverse() && !scrolled() && !mobileOpen()"
  [class.navbar--open]="mobileOpen()"
  aria-label="Navegación principal"
>
  <div class="navbar__inner container">
    <a class="navbar__brand" routerLink="/" aria-label="Yachaytambo — Inicio">
      <img
        class="navbar__logo-img"
        src="/logo.png"
        alt="Yachaytambo"
        width="44"
        height="44"
        loading="eager"
      />
      <span class="navbar__logo-block">
        <span class="navbar__logo-text">Yachaytambo</span>
        <span class="navbar__logo-sub">Retiros Mente que Sana</span>
      </span>
    </a>

    <ul class="navbar__links">
      @for (link of links; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="is-active"
            class="navbar__link"
          >{{ link.label }}</a>
        </li>
      }
    </ul>

    <a
      class="navbar__cta"
      routerLink="/contacto"
      aria-label="Reservar lugar — hablar con el equipo"
    >Reservar mi lugar</a>

    <button
      class="navbar__burger"
      type="button"
      (click)="toggleMobile()"
      [attr.aria-expanded]="mobileOpen()"
      aria-controls="mobile-menu"
      aria-label="Menú"
    >
      <span class="navbar__burger-line" [class.is-open]="mobileOpen()"></span>
      <span class="navbar__burger-line" [class.is-open]="mobileOpen()"></span>
      <span class="navbar__burger-line" [class.is-open]="mobileOpen()"></span>
    </button>
  </div>

  @if (mobileOpen()) {
    <div class="navbar__mobile" id="mobile-menu" @mobileMenu>
      <ul class="navbar__mobile-links">
        @for (link of links; track link.path) {
          <li>
            <a
              [routerLink]="link.path"
              routerLinkActive="is-active"
              class="navbar__mobile-link"
            >{{ link.label }}</a>
          </li>
        }
        <li>
          <a routerLink="/contacto" class="navbar__mobile-cta">Reservar mi lugar</a>
        </li>
      </ul>
    </div>
  }
</nav>
